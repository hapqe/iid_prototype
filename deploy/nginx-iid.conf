# nginx reverse proxy for the IID demo on hapke.me
#
# Layout on the server:
#   - middleware hub (WebSocket)      -> 127.0.0.1:7777
#   - pager app    (prototype_webview, vite dev) -> 127.0.0.1:3000  -> pager.iid.hapke.me
#   - keyboard app (iid_keyboard,      vite dev) -> 127.0.0.1:3001  -> keyboard.iid.hapke.me
#
# Both apps open a same-origin WebSocket to "/ws". nginx forwards "/ws" directly
# to the shared hub on 7777, so the two apps talk to each other through it.
# Everything else (incl. Vite HMR's own WebSocket on "/") goes to the app.
#
# Install:
#   sudo cp deploy/nginx-iid.conf /etc/nginx/sites-available/iid.hapke.me
#   sudo ln -s /etc/nginx/sites-available/iid.hapke.me /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS certs (Let's Encrypt):
#   sudo certbot --nginx -d keyboard.iid.hapke.me -d pager.iid.hapke.me

# Map the Upgrade header so WebSocket upgrades pass through correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# keyboard.iid.hapke.me  ->  vite dev server on :3001
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name keyboard.iid.hapke.me;

    # Shared WebSocket hub (the middleware)
    location /ws {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # The keyboard app + its Vite HMR websocket
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# pager.iid.hapke.me  ->  vite dev server on :3000
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name pager.iid.hapke.me;

    location /ws {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# NOTE: After running certbot, it will inject the `listen 443 ssl` blocks and
# cert paths automatically and add an http->https redirect. The two location
# blocks above are reused for the TLS server blocks. If you configure TLS by
# hand instead, copy each server block, change `listen 80` to
# `listen 443 ssl;`, add your ssl_certificate / ssl_certificate_key lines, and
# add a redirect server on :80.
